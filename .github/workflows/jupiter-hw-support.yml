name: jupiter-hw-support
on:
  push:
    branches: [main]
    paths: ['jupiter-hw-support/**', 'oci/**', '.github/workflows/jupiter-hw-support.yml', '.github/workflows/_package-image.yml', 'toolchain.env']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  build:
    uses: ./.github/workflows/_package-image.yml
    secrets: inherit
    with:
      package: jupiter-hw-support
